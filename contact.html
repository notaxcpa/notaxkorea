<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>무료 상담 신청 | NOTAX 세무회계</title>
    <meta name="description" content="회계사가 직접 상담하고 꼼꼼하게 관리하는 NOTAX 세무회계. 인천 남동구·연수구·송도 법인기장, 개인사업자 기장, 창업 세무상담 전문.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/notaxkorea/css/style.css">
    <style>
        /* 상담 섹션 전용 스타일 */
        .contact-section {
            padding: 60px 0 80px;
            background: #fff;
        }
        .contact-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 48px;
            justify-content: space-between;
        }
        .contact-form-box {
            flex: 1.5;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05);
            border: 1px solid #eef2ff;
            padding: 40px;
        }
        .contact-info-box {
            flex: 1;
            background: #f8fafc;
            border-radius: 28px;
            padding: 40px;
        }
        .form-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
        }
        .form-subtitle {
            color: #4b5563;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #1e4a76;
            box-shadow: 0 0 0 3px rgba(30,74,118,0.1);
        }
        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }
        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: white;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 500;
            color: #1e293b;
            border: 1px solid #eef2ff;
            transition: 0.2s;
        }
        .contact-link:hover {
            background: #1e4a76;
            color: white;
            transform: translateY(-2px);
        }
        .map-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 60px;
            padding: 12px 20px;
            text-decoration: none;
            color: #1e293b;
            border: 1px solid #eef2ff;
            cursor: pointer;
        }
        .btn-submit {
            width: 100%;
            background: #1e4a76;
            color: white;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 768px) {
            .contact-wrapper { flex-direction: column; }
            .contact-form-box, .contact-info-box { padding: 24px; }
        }
    </style>
</head>
<body>
<div id="header"></div>
<main>
    <section class="contact-section">
        <div class="container">
            <div class="contact-wrapper">
                <!-- 왼쪽: 상담 신청 폼 -->
                <div class="contact-form-box">
                    <h2 class="form-title">지금 바로 상담 신청</h2>
                    <p class="form-subtitle">매출·업종·직원 수를 알려주시면 더 정확하게 안내드립니다.</p>
                    
                    <form id="taxContactForm">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="이름 *" required>
                        </div>
                        <div class="form-group">
                            <input type="tel" name="phone" placeholder="연락처 (숫자만 입력) *" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="이메일">
                        </div>
                        <div class="form-row">
                            <select name="industry">
                                <option value="">업종 선택</option>
                                <option>제조업</option><option>도소매업</option><option>서비스업</option>
                                <option>건설업</option><option>프리랜서</option><option>기타</option>
                            </select>
                            <select name="revenue">
                                <option value="">연간 매출 규모</option>
                                <option>1억 미만</option><option>1억~5억</option>
                                <option>5억~10억</option><option>10억 이상</option>
                            </select>
                            <select name="businessType">
                                <option value="">사업자 형태</option>
                                <option>개인사업자</option><option>법인사업자</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="text" name="employees" placeholder="직원 수 (선택)">
                        </div>
                        <div class="form-group">
                            <textarea name="message" rows="4" placeholder="구체적인 고민이나 문의사항을 남겨주세요. (선택)"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">📋 무료 상담 신청</button>
                    </form>
                </div>

                <!-- 오른쪽: 연락처 및 지도 정보 -->
                <div class="contact-info-box">
                    <h3 style="font-size:1.4rem; margin-bottom:12px;">📞 빠른 상담은?</h3>
                    <div class="contact-buttons">
                        <a href="tel:01086763827" class="contact-link">
                            <span>📞</span> 010-8676-3827
                        </a>
                        <a href="sms:01086763827" class="contact-link">
                            <span>💬</span> 문자로 상담 신청하기
                        </a>
                        <a href="mailto:notaxcpa@naver.com" class="contact-link">
                            <span>✉️</span> notaxcpa@naver.com
                        </a>
                        <button class="map-banner" onclick="openNaverMap()">
                            <span>📍</span> 인천 남동구 남동대로 217 한국산업단지공단 5층
                            <span>▶</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<div id="footer"></div>
<script>
    document.getElementById('taxContactForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = this.querySelector('input[name="name"]')?.value;
        const phone = this.querySelector('input[name="phone"]')?.value;
        if (!name || !phone) {
            alert('이름과 연락처는 필수 입력 항목입니다.');
            return;
        }
        alert(`✅ 상담 신청이 접수되었습니다.\n📞 ${phone}\n회계사가 24시간 이내 직접 연락드립니다.`);
        this.reset();
    });
    function openNaverMap() {
        window.open('https://map.naver.com/v5/search/인천 남동구 남동대로 217', '_blank');
    }
</script>
<script src="/notaxkorea/js/main.js"></script>
</body>
</html>
